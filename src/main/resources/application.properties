spring.application.name=board
# H2 ?????? ??
spring.datasource.url=jdbc:h2:mem:board
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.defer-datasource-initialization=true
spring.batch.job.name=printTitleToUppercaseJob
# H2 ? ?? - ?????? http://localhost:8080/h2-console ? DB ?? ??
spring.h2.console.enabled=true
# JPA ??
spring.jpa.hibernate.ddl-auto=create
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
# JWT
jwt.secret=YourSuperSecretKeyThatIsAtLeast32BytesLong!
jwt.expiration=3600000
# adminPassword
app.admin.password=test1234
spring.data.web.pageable.default-page-size=20
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.cache.type=redis
spring.cache.redis.time-to-live=1800000
# RabbitMQ
spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest
